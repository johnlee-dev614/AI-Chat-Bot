openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Character Chat Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Email/password authentication endpoints.
  - name: characters
    description: AI character operations
  - name: chat
    description: Chat and messaging operations
  - name: users
    description: User account operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /auth/signup:
    post:
      tags: [Auth]
      operationId: signup
      summary: Create a new account with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '200':
          description: Account created and session established.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '400':
          description: Validation error (invalid email, password too short, missing display name).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Email already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful, session established.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '401':
          description: Invalid email or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: End the current session
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Logged out successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /characters:
    get:
      operationId: listCharacters
      tags: [characters]
      summary: List all available AI characters
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of characters
          content:
            application/json:
              schema:
                type: object
                required: [characters]
                properties:
                  characters:
                    type: array
                    items:
                      $ref: "#/components/schemas/Character"

  /characters/{slug}:
    get:
      operationId: getCharacter
      tags: [characters]
      summary: Get a specific character by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Character found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "404":
          description: Character not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /chat/{characterSlug}/messages:
    get:
      operationId: getChatHistory
      tags: [chat]
      summary: Get chat history for a character
      parameters:
        - name: characterSlug
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                type: object
                required: [messages]
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message to a character
      parameters:
        - name: characterSlug
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: AI response message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /chat/{characterSlug}/messages/clear:
    delete:
      operationId: clearChatHistory
      tags: [chat]
      summary: Clear chat history for a character
      parameters:
        - name: characterSlug
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Chat cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/favorites:
    get:
      operationId: getFavorites
      tags: [users]
      summary: Get user's favorited characters
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Favorites list
          content:
            application/json:
              schema:
                type: object
                required: [favorites]
                properties:
                  favorites:
                    type: array
                    items:
                      type: string

  /users/favorites/{characterSlug}:
    post:
      operationId: addFavorite
      tags: [users]
      summary: Add character to favorites
      parameters:
        - name: characterSlug
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Added to favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: removeFavorite
      tags: [users]
      summary: Remove character from favorites
      parameters:
        - name: characterSlug
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Removed from favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/account:
    get:
      operationId: getAccount
      tags: [users]
      summary: Get user account info
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Account info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfo"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, displayName]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        displayName:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    SignupRequest:
      type: object
      required: [email, password, displayName, acceptedTerms, confirmedTerms]
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 8
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        acceptedTerms:
          type: boolean
        confirmedTerms:
          type: boolean

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 1

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Character:
      type: object
      required: [id, slug, name, description, tags, category, isOnline, avatarUrl, personalityTraits, conversationStarters]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        bio:
          type: [string, 'null']
        tags:
          type: array
          items:
            type: string
        category:
          type: string
        isOnline:
          type: boolean
        avatarUrl:
          type: [string, 'null']
        personalityTraits:
          type: array
          items:
            type: string
        conversationStarters:
          type: array
          items:
            type: string
        dateOfBirth:
          type: [string, 'null']
        gender:
          type: [string, 'null']
        language:
          type: [string, 'null']
        height:
          type: [string, 'null']
        weight:
          type: [string, 'null']
        ethnicity:
          type: [string, 'null']
        horoscope:
          type: [string, 'null']
        jobTitle:
          type: [string, 'null']

    Message:
      type: object
      required: [id, characterSlug, role, content, createdAt]
      properties:
        id:
          type: string
        characterSlug:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        audio:
          type: [string, 'null']
          description: Base64-encoded MP3 audio of the AI reply (only present on assistant messages from sendMessage)

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 2000

    AccountInfo:
      type: object
      required: [user, favorites, totalChats]
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        favorites:
          type: array
          items:
            type: string
        totalChats:
          type: integer
